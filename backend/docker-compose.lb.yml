version: '3.9'

services:
  api1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-ECommerceAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-ECommerceClient}
      MongoDbSettings__ConnectionString: ${MONGO_CONNECTION_STRING}
      MongoDbSettings__DatabaseName: ${MONGO_DB_NAME:-ECommerceDB}
      CORS__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
    expose:
      - "8080"

  api2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Jwt__SecretKey: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-ECommerceAPI}
      Jwt__Audience: ${JWT_AUDIENCE:-ECommerceClient}
      MongoDbSettings__ConnectionString: ${MONGO_CONNECTION_STRING}
      MongoDbSettings__DatabaseName: ${MONGO_DB_NAME:-ECommerceDB}
      CORS__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
    expose:
      - "8080"

  lb:
    image: nginx:1.27-alpine
    depends_on:
      - api1
      - api2
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
